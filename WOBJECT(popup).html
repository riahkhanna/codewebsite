<!DOCTYPE html>
<html>
<head>
    <title>PopUp3</title>
</head>
<body>

    <script>
        function text1() {
         let v = prompt("What is your name?");
            
            if (v) {
                alert("I AM " + v);
            } else {
                alert("You didn't enter anything 😒");
            }
        }
    </script>

    <button type="button" onclick="text1()">CLICK HERE TO VIEW</button>

</body>
</html>
