<html>
    <head>
        <title>array syntax</title>
    </head>
    <body>
        <script>
            let fruits= new Array();
            {
                fruits[0]="apple";
                fruits[1]="banana";
                fruits[2]="mango";
                fruits[3]="lichi";
                document.write(fruits);
            }
        </script>
    </body>
</html>
