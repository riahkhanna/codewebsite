<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="cal">

<form name="calc">
    <div class="show">
        <input type="text" name="show" readonly>
    </div> 

    <div>
        <input type="button" value="AC" onclick="calc.show.value=''">
        <input type="button" value="DE" onclick="calc.show.value=calc.show.value.slice(0,-1)">
        <input type="button" value="." onclick="calc.show.value+='.'">
        <input type="button" value="/" onclick="calc.show.value+='/'">
    </div>

    <div>
        <input type="button" value="7" onclick="calc.show.value+='7'">
        <input type="button" value="8" onclick="calc.show.value+='8'">
        <input type="button" value="9" onclick="calc.show.value+='9'">
        <input type="button" value="*" onclick="calc.show.value+='*'">
    </div>

    <div>
        <input type="button" value="4" onclick="calc.show.value+='4'">
        <input type="button" value="5" onclick="calc.show.value+='5'">
        <input type="button" value="6" onclick="calc.show.value+='6'">
        <input type="button" value="-" onclick="calc.show.value+='-'">
    </div>

    <div>
        <input type="button" value="1" onclick="calc.show.value+='1'">
        <input type="button" value="2" onclick="calc.show.value+='2'">
        <input type="button" value="3" onclick="calc.show.value+='3'">
        <input type="button" value="+" onclick="calc.show.value+='+'">
    </div>

    <div>
        <input type="button" value="0" onclick="calc.show.value+='0'">
        <input type="button" value="00" onclick="calc.show.value+='00'">
        <input type="button" value="=" onclick="calculate()">
    </div>

</form>

        </div>
    </div>

<script>
function calculate(){
    try{
        calc.show.value = eval(calc.show.value);
    } catch{
        calc.show.value = "Error";
    }
}
</script>

</body>
</html>
