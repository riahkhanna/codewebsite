<!DOCTYPE html>
<head>
    <title>background image</title>
</head>
<body>
    <h1>background image using css</h1>
    <style>
        body {
            background-image: url('https://images.pexels.com/photos/19700095/pexels-photo-19700095.jpeg?cs=srgb&dl=pexels-anaam-farooq-765472679-19700095.jpg&fm=jpg');
            background-repeat: no-repeat;
            background-size: 50px;
            background-size: cover;
            z-index:: -1;
            background-attachment: fixed;
        }
    </style>
</body>
<p>This is an example of a background image applied using CSS.</p>
</html>
