<!DOCTYPE html>
<html lang="en">
    <head>
        <title> button example</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
   <body>
        <div class="container mt-3">
            <h2>Button Example</h2>
            <button type="button" class="btn btn-primary">Primary</button>
            <button type="button" class="btn btn-secondary">Secondary</button>
            <button type="button" class="btn btn-success">Success</button>
            <button type="button" class="btn btn-danger">Danger</button>
            <button type="button" class="btn btn-warning">Warning</button>
            <button type="button" class="btn btn-info">Info</button>
            <button type="button" class="btn btn-light">Light</button>
            <button type="button" class="btn btn-dark">Dark</button>
</div>
<br>
<br>
<br>
<br>
<div class="container mt-3">
    <h2>Outline Button Example</h2>
    <button type="button" class="btn btn-outline-primary">Primary</button>
    <button type="button" class="btn btn-outline-secondary">Secondary</button>
    <button type="button" class="btn btn-outline-success">Success</button>
    <button type="button" class="btn btn-outline-danger">Danger</button>
    <button type="button" class="btn btn-outline-warning">Warning</button>
    <button type="button" class="btn btn-outline-info">Info</button>
    <button type="button" class="btn btn-outline-light">Light</button>
    <button type="button" class="btn btn-outline-dark">Dark</button>
</div>
<br>
<br>
<br>
<br>
<div class="container mt-3">
    <h2>Disabled Button Example</h2>
    <button type="button" class="btn btn-primary" disabled>Primary</button>
    <button type="button" class="btn btn-secondary" disabled>Secondary</button>
    <button type="button" class="btn btn-success" disabled>Success</button>
    <button type="button" class="btn btn-danger" disabled>Danger</button>
    <button type="button" class="btn btn-warning" disabled>Warning</button>
    <button type="button" class="btn btn-info" disabled>Info</button>
    <button type="button" class="btn btn-light" disabled>Light</button>
    <button type="button" class="btn btn-dark" disabled>Dark</button>
</div>
<br>
<br>
<br>
<br>
<div class="container mt-3">
    <h2>Active Button Example</h2>
    <button type="button" class="btn btn-primary active">Primary</button>
    <button type="button" class="btn btn-secondary active">Secondary</button>
    <button type="button" class="btn btn-success active">Success</button>
    <button type="button" class="btn btn-danger active">Danger</button>
    <button type="button" class="btn btn-warning active">Warning</button>
    <button type="button" class="btn btn-info active">Info</button>
    <button type="button" class="btn btn-light active">Light</button>
    <button type="button" class="btn btn-dark active">Dark</button>
</div>
<br>
<br>
<br>
<br>
    <div class="btn-lg" role="lg" aria-label="Basic example">
        <h2>Button Sizes</h2>
    <button type="button" class="btn btn-primary btn-lg">Large</button>
<br><br>
    <button type="button" class="btn btn-primary">Default</button>
<br><br>
    <button type="button" class="btn btn-primary btn-sm">Small</button>
</div>
<br>
<br>
<br>
<br>
<div class="container mt-3">
    <h2>Block Button Example</h2>
    <button type="button" class="btn btn-primary btn-lg btn-block">Block level button</button>
    <button type="button" class="btn btn-secondary btn-lg btn-block">Block level button</button>
</div>

<br>
<br>
<br>
<br>
<div class="container mt-3">
    <div class="d-grid">
  <button type="button" class="btn btn-primary btn-block">Full-Width Button</button>
  <br>
    <button type="button" class="btn btn-secondary btn-block">Full-Width Button</button>
    <br>
    <button type="button" class="btn btn-success btn-block">Full-Width Button</button>
<br>
    <button type="button" class="btn btn-danger btn-block">Full-Width Button</button>
</div>
<br>
<br>
<br>

  <span class="spinner-border spinner-border-sm"></span>
</button>

</button>

<button class="btn btn-primary" disabled>

<button class="btn btn-primary" disabled>

</button>

    <div class="container mt-3">
    <div class="<div class="btn-group" data-bs-toggle="buttons">
        <h2> radio Button Example</h2>
        <label
            class="btn btn-dark active"
        >
            <input
                type="radio"
                class="me-2"
                name="options"
                id="option1 "
                autocomplete="off"
                checked
            />
            Choice
        </label>
        <label
            class="btn btn-dark"
        >
            <input type="radio" name="options" id="option2" autocomplete="off" /> Choice
        </label>
        <label
            class="btn btn-dark"
        >
            <input type="radio" name="options" id="option3" autocomplete="off" /> Choice
        </label>
    </div>

    <div class="btn-group">
        <h2>Button Group Example.</h2>
        <br>
  <button type="button" class="btn btn-primary">TYPE1</button>
  <button type="button" class="btn btn-primary">TYPE2</button>
  <button type="button" class="btn btn-primary">TYPE3</button>
</div>
<br>
<br>
<br>
<div class="btn-group-vertical">
    <h2>Vertical Button Group Example.</h2>
    <br>
  <button type="button" class="btn btn-secondary">button1</button>
  <button type="button" class="btn btn-primary">button2</button>
  <button type="button" class="btn btn-default
  ">button3</button>
</div>
    </body>
</html>
