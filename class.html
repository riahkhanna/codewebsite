<!DOCTYPE html>
<html>
<head>
    <title>CLASS JS</title>
</head>
<body>

<script>
class Element {
    constructor(id, name) {
        this.id = id;
        this.name = name;
    }

    detail() {
        document.write(this.id + " " + this.name + "<br/>");
    }
}

var x = new Element(401, "RIAH KHANNA");
var y = new Element(302, "RIYA KHANNA");
var z = new Element(503, "RHEA KHANNA");

x.detail();
y.detail();
z.detail();
</script>

</body>
</html>
