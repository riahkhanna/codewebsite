<html>
    <head>
        <title>Comments Example</title>
        <style>
            /* This is a single-line comment in CSS */
            body
            {
                font-family: Arial, sans-serif; /* Setting the font for the body */
            }
            /*
             This is a multi-line comment in CSS
             The following class will style highlighted text
            */
            .highlight {
                background-color: yellow; /* Highlight background color */
                font-weight: bold; /* Make text bold */
            }
        </style>
    </head>
    <body>
        <body-style background-color="lightblue">
            <p style="color:blue"> This is a color property example. </p>
         <p style="background-color:pink"> This is an background color property example.</p>
         <p id="main"> idk idk idk idk idk idk..... </p>
        <h1>CSS Comments Example</h1>
        <p style="border:2px solid red">look here!!</p>

<h2 style="color:green">hello this is a border color property. </h2>

        <p>This paragraph is styled normally.</p>
        <p class="highlight">This paragraph is highlighted using a CSS class.</p>
    </body>
</html>
