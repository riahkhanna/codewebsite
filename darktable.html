<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Darktable Table Example</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="container">
        <h2>Darktable Table Example</h2>
        <table class="table table-dark">
                <thead>
                    <tr>
                        <th>NAME</th>
                        <th>LAST NAME</th>
                        <th>AGE</th>
                        <th>SECTOR NAME</th>
                        
                </thead>
                <tbody>
                    <tr>
                        <td>RIAH</td>
                        <td>KHANNA</td>
                        <td>18</td>
                        <td>SECTOR-7</td>
                    </tr>
                    <tr>
                        <td>RIYA</td>
                        <td>KHANNA</td>
                        <td>19</td>
                        <td>SECTOR-4</td>
                    </tr>
                    <tr>
                        <td>RHEA</td>
                        <td>KHANNA</td>
                        <td>17</td>
                        <td>SECTOR-5</td>
                    </tr>
                </tbody>
            </table>
        </div>
</html>
