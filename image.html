<!DOCTYPE html>
<html lang="en">
    <head>
        <title>circled image example</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="container mt-3">
            <h2>Circle Image Example</h2>
            <img src="https://images.pexels.com/photos/669502/pexels-photo-669502.jpeg?cs=srgb&dl=pexels-goumbik-669502.jpg&fm=jpg" class="rounded-circle" alt="Circle Image" class="mx-auto d-block" style="width: 259px; height: 200px;">
        </div>
        <div class="container mt-3">
            <h2>Rounded Image Example</h2>
            <img src="https://images.pexels.com/photos/669502/pexels-photo-669502.jpeg?cs=srgb&dl=pexels-goumbik-669502.jpg&fm=jpg" class="rounded corner" alt="Rounded Image" class="mx-auto d-block" style="width: 259px; height: 200px;">
        </div>
        <div class="container mt-3">
            <h2>Thumbnail Image Example</h2>
            <img src="https://images.pexels.com/photos/669502/pexels-photo-669502.jpeg?cs=srgb&dl=pexels-goumbik-669502.jpg&fm=jpg" class="img-thumbnail" alt="Thumbnail Image" class="mx-auto d-block" style="width: 259px; height: 200px;">
        </div>
        <div class="container mt-3">
            <h2>Fluid Image Example</h2>
            <img src="https://images.pexels.com/photos/669502/pexels-photo-669502.jpeg?cs=srgb&dl=pexels-goumbik-669502.jpg&fm=jpg" class="img-fluid" alt="Fluid Image" class="mx-auto d-block" style="width: 259px; height: 200px;">
        </div>
    </body>
</html>
