<html>
    <head>
        <title>outline-color example</title>
    </head>
<style>  
    p {
        outline-style: solid;
        outline-width: 5px;
        outline-color: red;
    }
    </style>
<body>
    <p> this is an eg of outline with red color.</p>
    <p style="outline-color: blue;"> this is an eg of outline with blue color.</p>
    <p style="outline-color: green;"> this is an eg of outline with green color.</p>
</body>
</html>
