<!DOCTYPE html>
<html>
    <head>
        <title>outline-offset example</title>
<style>
    .red  {
        border:2px solid yellow;
        outline:3px solid red;
        outline-offset: 10px;
    }
    </style>
</head>
<body>
    <p>MY NAME IS RIYA</p>
    <p class="red"> MY NAME IS RIYA KHANNA</p>
</body>
</html> bubble labs
