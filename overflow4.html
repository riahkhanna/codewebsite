<!DOCTYPE html>
<head>
    <title>overflow Example</title>
<style>
div {
    background-color: lightblue;
    width: 200px;
    height: 150px;
    border: 5px solid black;
    overflow: auto;
}
</style>
</head>
<body>

    <div>
        This is an example of overflow property in CSS. This text is meant to exceed the boundaries of the div element to demonstrate how the overflow property works when set to auto. When the content exceeds the size of the container, scrollbars will appear to allow access to the overflowing content.
    </div>

</body>
</html>
