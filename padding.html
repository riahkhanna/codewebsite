<!DOCTYPE html>
<head>
    <title>padding Example</title>
<style>
    p {
        padding-top: 30px;
        padding-left: 40px;
        padding-right: 50px;
        padding-bottom: 60px;
        background-color: yellow;
    }
</style>
</head>
<body>
    <p>
        This is an example of padding property in CSS.
    </p>
    <p>
        Padding is the space between the content of the element and its border.
    </p>
    <P>
        In this example, we have set different padding values for the top, left, right, and bottom sides of the paragraph element.
    </P>
</body>
</html>
