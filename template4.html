<!DOCTYPE html>
<html>
    <head>
        <title>Template4</title>
        <style>

 body {
             margin: 0;
             font-family: Arial, sans-serif;
    }
/* Style the navbar */
             #navbar 
    {
             position: sticky;
              top: 0;
                 overflow: hidden;
             background-color: #333;
     }
 /* Navbar links */
        #navbar a
    {
        float: left;
        display: block;
            color: #f2f2f2;
        text-align: center;
        padding: 14px;
        text-decoration: none;
     }
     /* Page content */
        content
     {
        padding: 16px;
     }
 /* Page content */
        content 
    {
        padding: 16px;
     }
 /* Change color on hover */
        #navbar a:hover 
    {
         background-color: #ddd;
         color: black;
    }
        body
     {
        margin: 0;
        background: #f1f1f1;
        font-family: Arial, sans-serif;
     }

        .container 
    {
        max-width: 1200px;
        margin: auto;
        background: white;
     }
    .nav 
    {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: white;
    }
     .nav a 
    {
     text-decoration: none;
     color: black;
     margin-left: 20px;
     }

     .hero 
     {
      position: relative;
      }
     .hero img
     {
      width: 100%;
      height: 90vh;
      object-fit: cover;
     }
        .hero-text 
        {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 36px;
        }
    flex-container2 
    {
    display:flex;
    flex-direction:row;
    width: 100%;
    height: 400px;
    }
    .flex-item2 
    {
    background-color: cornflowerblue;
    width: 100px;
    height: 100px;
    margin: 10px;
    font-size: 30px;
    color: white;
    text-align: left;
    }
    img 
    {
    margin: 5px;
    }

</style>
</head>
<body>
       <div id="navbar">
 <a href="#home">Home</a>
 <a href="#about">About</a>
 <a href="#contact">Contact</a>
</div>
         </div>
        </div>
        <div class="hero">
        <img src="https://www.w3schools.com/w3images/jane.jpg" alt="Woman in black top and white skirt standing against weathered industrial metal wall with rust and peeling paint, wearing sunglasses, contemplative pose">
        </div>
        <div class="flex-container2">
    <img src="https://www.w3schools.com/w3images/jane.jpg" alt="Jane">  
        <div class="flex-item2">1</div>

        <div class="flex-item2">2</div>

        <div class="flex-item2">3</div>

        <div class="flex-item2">4</div

</body>
</html>
