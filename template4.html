<!doctype html>
<html lang="en">
    <head>
        <title>grid example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    body, h1 {
      font-family: "Montserrat", monospace;
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
      margin: 40px 0;
    }
    header h1 {
      font-weight: bold;
    }
    .menu-btn {
      float: right;
      background: white;
      border: none;
      font-size: 2rem;
      cursor: pointer;
    }
    .grid {
      display: flex;
      gap: 16px;
      margin: 40px auto;
      max-width: 1200px;
    }
    .grid-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .grid-column img {
      width: 100%;
      display: block;
    }
    footer {
      text-align: center;
      padding: 40px;
      background: #f0f0f0;
      margin-top: 40px;
      font-size: 1.5rem;
    }
    footer i {
      margin: 0 8px;
      cursor: pointer;
    }
    footer i:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="sidebar" id="mySidebar">
 
  </div>
  <header>
    <button class="menu-btn" onclick="openSidebar()"><i class="fa fa-bars"></i></button>
    <h1>PHOTOLIO</h1>
    <p>A simple template for photographers.</p>
    <button onclick="toggleGrid()">Toggle Grid Padding</button>
  </header>
  <div class="grid" id="myGrid">
  <div class="grid-column">
    <img src="https://www.w3schools.com/w3images/coffee.jpg" alt="Coffee">
    <img src="https://www.w3schools.com/w3images/bridge.jpg" alt="Bridge">
    <img src="https://www.w3schools.com/w3images/mist.jpg" alt="Mist">
    <img src="https://www.w3schools.com/w3images/london.jpg" alt="London">
    <img src="https://www.w3schools.com/w3images/woods.jpg" alt="Woods">
    <img src="https://www.w3schools.com/w3images/woods.jpg" alt="Woods">
     <img src="https://www.w3schools.com/w3images/workshop.jpg" alt="workshop"
     <img src=" https://www.w3schools.com/w3images/skies.jpg" alt="skies">
     <img src="https://www.w3schools.com/w3images/skies.jpg" alt="skies">
  </div>
  <div class="grid-column">
    <img src="https://www.w3schools.com/w3images/nature.jpg" alt="Nature">
    <img src="https://www.w3schools.com/w3images/avatar_g.jpg" alt="Avatar">
    <img src="https://www.w3schools.com/w3images/bridge.jpg" alt="Bridge">
    <img src="https://www.w3schools.com/w3images/workshop.jpg" alt="Workshop">
    <img src="https://www.w3schools.com/w3images/gondol.jpg" alt="Gondola">
    <img src="https://www.w3schools.com/w3images/nature.jpg" alt="Nature">
  </div>
  <div class="grid-column">
    <img src="https://www.w3schools.com/w3images/lights.jpg" alt="Lights">
    <img src="https://www.w3schools.com/w3images/sound.jpg" alt="Sound">
    <img src="https://www.w3schools.com/w3images/woods.jpg" alt="Woods">
    <img src="https://www.w3schools.com/w3images/skies.jpg" alt="Skies">
    <img src="https://www.w3schools.com/w3images/london.jpg" alt="London">
    <img src="https://www.w3schools.com/w3images/avatar_g.jpg" alt="Avatar">
    <img src="https://www.w3schools.com/w3images/sound.jpg" alt="sound">
  </div>
</div>
  </div>
 <footer>
  <i class="fa fa-facebook-official"></i>
  <i class="fa fa-instagram"></i>
  <i class="fa fa-snapchat"></i>
  <i class="fa fa-pinterest-p"></i>
  <i class="fa fa-twitter"></i>
  <i class="fa fa-linkedin"></i>
    <p>BY RIAH KHANNA</p>
  </footer>
</body>
</html>
