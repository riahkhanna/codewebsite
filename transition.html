<html>
    <head>
        <title>transition example</title>
    </head>
<style>
   #demo {
      height: 100px;
      width: 100px;
      background:lightblue;
      transition:2s;
}
#demo:hover {
      background-color:lightgreen;
      width: 900px;
}
</style>   
<body>
    <div id="demo"></div>
    <h3><i>Hover over the blue box to see the transition effect.</i></h3>
</body>
</html>
