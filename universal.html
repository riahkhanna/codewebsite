<html>
    <head>
        <title>CSS Class Example</title>
        <style>
            * {
                text-align: center ;
                color: blue;
                background-color: lightyellow;
            }
        </style>
    </head>
    <body>
        <p class="demo">This is a paragraph with class styling.</p>
        <p class="demo">Another paragraph with the same class styling.</p>
    </body>
</html>
