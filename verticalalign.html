<!DOCTYPE html>
<head>
    <title>vertical-align Example</title>
<style>
    img.texttop {
        vertical-align: top;
    }

    img.textbottom {
        vertical-align: bottom;
    }
</style>
<body>
    <div>
    <p><h1>This is an example of vertical-align property in CSS.</h1></p>
    <img class="texttop" src="https://images.pexels.com/photos/20804701/pexels-photo-20804701.jpeg?cs=srgb&dl=pexels-agrosales-20804701.jpg&fm=jpg" alt="Example Image" width="150" height="100">
    <br>
    <p><h1>This is an another example of vertical-align property in CSS.</h1></p>
     <img src="https://images.pexels.com/photos/20804701/pexels-photo-20804701.jpeg?cs=srgb&dl=pexels-agrosales-20804701.jpg&fm=jpg" class="textbottom" alt="Example Image" width="150" height="100">
    </div>
</body>
</html>
