<html>
    <head>
        <title>visibility example</title>
    </head>
<style>
   h3.show {
     visibility: visible;
   }
    h3.hide {
      visibility: hidden;
    }
</style>
<body>
    <h3 class="show">This is visible heading</h3>
    <h3 class="hide">This is hidden heading</h3>
    </body>
</html>
