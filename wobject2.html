<!DOCTYPE html>
<html>
<head>
    <title>popup2</title>
</head>
<body>
    <h2>
        This is another example of a pop up message.
    </h2>

    <script>
        function text1() {
            let v = confirm("HI! MY NAME IS RIYA. WILL YOU BE MY FRIEND?");

            if (v == true) {
                alert("AHHAAN!, GOOD CHOICE.");
            } else {
                alert("Cancel");
            }
        }
    </script>

    <button type="button" onclick="text1()">Click here to view</button>
</body>
</html>
