<html>
    <head>
        <title>Word Wrap Example</title>
        <style>
            p.demo {
                width: 200px;
                border: 1px solid black;
                word-wrap: break-word;
                padding : 10px;
                background-color: lightblue;
            }
        </style>
    </head>
    <body>
        <p class="demo">
            Thisisaverylongwordthatneedstobewrappedbecauseitexceedsthewidthofthecontainer.
        </p>
        <br><br>
        <p class="demo">
            This is a normal sentence that will wrap automatically when it reaches the end of the container width.
    </body>
</html>
