<html>
<head>
    <title>z-index with image</title>
<style>
img {
  position: absolute;
  left: 0px;
  top: 0px;
  z-index: -1;
  object-fit: cover;
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>
    <img src=https://i0.wp.com/picjumbo.com/wp-content/uploads/beautiful-nature-mountain-scenery-with-flowers-free-photo.jpg?w=2210&quality=70&ssl=1 alt="Nature Image">    
    <h1>Image with z-index</h1>
    <p>This is an example of using z-index with an image.</p>
    <p>The image is positioned behind the text using a negative z-index value.  </p>
</body>
</html>
